# POST JSON request example
#
# Send this request:
#   apitool send -f examples/post-json.yaml --var base_url=https://jsonplaceholder.typicode.com
#
# Or set base_url in an .env file in this directory:
#   echo "BASE_URL=https://jsonplaceholder.typicode.com" > examples/.env
#   apitool send -f examples/post-json.yaml

name: Create Post
method: POST
url: "${base_url}/posts"
headers:
  Content-Type: application/json
  Accept: application/json
body: |
  {
    "title": "Hello, World",
    "body": "This is the post body.",
    "userId": 1
  }
